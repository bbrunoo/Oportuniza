<!-- chat.component.html -->
<div class="chat-container">
  <div class="chat-header">
    <h3>Chat com {{nomeTarget}}</h3>
    <h3>Conta logada {{currentUserName}}</h3>
  </div>

  <div class="chat-messages">
    <div *ngFor="let msg of messages">
      <div [ngClass]="{'my-message': msg.userName === currentUserName, 'other-message': msg.userName !== currentUserName}">
        <strong>{{ msg.userName }}</strong>
        <p>{{ msg.message }}</p>
        <span class="timestamp">{{ msg.sentDateTime | date:'shortTime' }}</span>
      </div>
    </div>
  </div>

  <div class="chat-input">
    <input [(ngModel)]="newMessage" placeholder="Digite uma mensagem" />
    <button (click)="sendMessage()">Enviar</button>
  </div>
</div>
