<div class="chat-container">

  <div class="chat-header">
    <h3>Chat com {{nomeTarget}}</h3>
    <h3>Conta logada {{currentUserName}}</h3>
  </div>

  <div class="conversas">
    <span>oi</span>
  </div>

  <div class="chat-messages">
    <div *ngFor="let msg of getMessages; trackBy: trackById">
      <div [ngClass]="{'my-message': msg.senderName === currentUserName, 'other-message': msg.senderName !== currentUserName}">
        <strong>{{ msg.senderName }}</strong>
        <p>{{ msg.message }}</p>
        <span class="timestamp">{{ msg.sentAt | date:'shortTime' }}</span>
      </div>
    </div>
  </div>

  <div class="chat-input">
    <input [(ngModel)]="newMessage" placeholder="Digite uma mensagem" />
    <button (click)="sendMessage()">Enviar</button>
  </div>
</div>
