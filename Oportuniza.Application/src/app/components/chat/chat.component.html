<div class="chat-container">
  <div class="chat-header">
    <h3>Conversa com {{ targetUserId }}</h3>
  </div>

  <div class="chat-messages">
    <div *ngFor="let msg of messages" class="chat-message" [ngClass]="{'sent': msg.from === 'Você', 'received': msg.from !== 'Você'}">
      <div class="message-bubble">
        <strong *ngIf="msg.from !== 'Você'">{{ msg.from }}:</strong>
        {{ msg.message }}
      </div>
    </div>
  </div>

  <div class="chat-input">
    <input
      type="text"
      [(ngModel)]="message"
      placeholder="Digite uma mensagem"
      (keydown.enter)="sendMessage()"
    />
    <button (click)="sendMessage()" [disabled]="!message.trim()">Enviar</button>
  </div>
</div>
